<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050006">
    <meta name="application-version" content="0.2.96">
    <title>Dox'x Click</title>
    <meta name="description" content="Dox'x Click is a compact pixel horror platform game where control shifts between the player and a hostile entity.">
    <style>
        * { box-sizing: border-box; }
        :root {
            --action-button-width: clamp(62px, 14dvh, 96px);
            --action-button-height: clamp(50px, 11dvh, 76px);
        }
        html, body { width: 100%; min-height: 100%; margin: 0; }
        html.doxx-embedded,
        html.doxx-embedded body { overflow: hidden !important; }
        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            overflow-x: hidden;
            background:
                radial-gradient(circle at 50% 25%, rgba(134, 25, 143, 0.1), transparent 42%),
                repeating-linear-gradient(0deg, rgba(217, 70, 239, 0.04) 0 1px, transparent 1px 5px),
                #050006;
            color: #f5d0fe;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
        button { font: inherit; -webkit-tap-highlight-color: transparent; }
        button,
        button * {
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        button:not(:disabled) { cursor: pointer; }
        .hidden { display: none !important; }
        .game-shell {
            width: min(100%, 177.7778dvh);
            padding: 0;
        }
        .game-frame {
            width: 100%;
            overflow: hidden;
            border: 0;
            border-radius: 12px;
            background: #09010b;
            box-shadow: 0 0 0 1px rgba(217, 70, 239, 0.2), 0 0 34px rgba(217, 70, 239, 0.14);
        }
        #doxxClickIntro,
        #doxxClickMenu,
        #doxxClickCanvas {
            width: 100%;
            aspect-ratio: 16 / 9;
        }
        #doxxClickIntro {
            position: relative;
            overflow: hidden;
            background: #050006;
        }
        .doxx-click-title-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.01);
        }
        .title-actions {
            position: absolute;
            z-index: 10;
            right: clamp(18px, 4vw, 44px);
            bottom: clamp(18px, 4vw, 42px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(7px, 1.5dvh, 12px);
        }
        .title-name {
            position: absolute;
            z-index: 10;
            top: 50%;
            left: 50%;
            margin: 0;
            padding: clamp(8px, 1.8dvh, 15px) clamp(13px, 2.8vw, 28px);
            border: 2px solid #c026d3;
            border-radius: 8px;
            background: #18181b;
            color: #e879f9;
            font-size: clamp(20px, 4.8dvh, 44px);
            font-weight: 950;
            line-height: 1;
            white-space: nowrap;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 2px rgba(74, 4, 78, 0.75), 0 8px 24px rgba(0, 0, 0, 0.62), 0 0 22px rgba(217, 70, 239, 0.28);
            text-shadow: 3px 0 #701a75, 0 4px 18px rgba(0, 0, 0, 0.8);
        }
        .title-name::after {
            content: "";
            position: absolute;
            right: 19%;
            bottom: 0;
            width: 0.52em;
            height: 0.52em;
            border-right: 2px solid #c026d3;
            border-bottom: 2px solid #c026d3;
            background: #18181b;
            transform: translateY(50%) rotate(45deg);
        }
        .title-side-actions {
            --title-action-gap: clamp(7px, 1.5dvh, 12px);
            position: absolute;
            z-index: 10;
            bottom: clamp(18px, 4vw, 42px);
            left: clamp(18px, 4vw, 44px);
            width: var(--action-button-width);
            height: var(--action-button-height);
        }
        .title-side-actions button {
            width: var(--action-button-width);
            height: var(--action-button-height);
            padding: 0;
            border: 1px solid #4a044e;
            border-radius: 8px;
            background: #18181b;
            color: #e879f9;
            font-size: clamp(16px, 3.4dvh, 24px);
            font-weight: 950;
            line-height: 1;
            box-shadow: 0 7px 22px rgba(0, 0, 0, 0.44);
        }
        .title-menu-items {
            position: absolute;
            left: 0;
            bottom: calc(var(--action-button-height) + var(--title-action-gap));
            display: flex;
            flex-direction: row;
            gap: var(--title-action-gap);
            pointer-events: none;
        }
        #doxxClickStageButton {
            width: var(--action-button-width);
            height: var(--action-button-height);
            padding: 0;
            border: 1px solid #4a044e;
            border-radius: 8px;
            background: #18181b;
            color: #e879f9;
            font-size: clamp(16px, 3.4dvh, 24px);
            font-weight: 950;
            line-height: 1;
            box-shadow: 0 7px 22px rgba(0, 0, 0, 0.44);
            transition: border-color 120ms ease, background-color 120ms ease, color 120ms ease;
        }
        .title-menu-items button {
            opacity: 0;
            transition: transform 220ms cubic-bezier(.2,.85,.25,1), opacity 90ms linear;
        }
        .title-menu-items button:nth-child(1) {
            transform: translateX(0);
            transition-delay: 0ms;
        }
        .title-menu-items button:nth-child(2) {
            transform: translateX(calc(0px - var(--action-button-width) - var(--title-action-gap)));
            transition-delay: 35ms;
        }
        .title-menu-items button:nth-child(3) {
            transform: translateX(calc(0px - var(--action-button-width) - var(--action-button-width) - var(--title-action-gap) - var(--title-action-gap)));
            transition-delay: 70ms;
        }
        .title-side-actions.is-open .title-menu-items { pointer-events: auto; }
        .title-side-actions.is-open .title-menu-items button {
            opacity: 1;
            transform: translateX(0);
        }
        .title-side-actions.is-open .title-menu-items button:nth-child(1) { transition-delay: 0ms; }
        .title-side-actions.is-open .title-menu-items button:nth-child(2) { transition-delay: 50ms; }
        .title-side-actions.is-open .title-menu-items button:nth-child(3) { transition-delay: 100ms; }
        #doxxClickTitleMenuButton {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(19px, 4.1dvh, 29px);
        }
        .title-menu-icon {
            display: block;
            width: 0.76em;
            height: 2px;
            border-radius: 999px;
            background: currentColor;
            box-shadow: 0 -0.25em currentColor, 0 0.25em currentColor;
        }
        .title-info-overlay {
            position: absolute;
            z-index: 50;
            inset: 0;
            display: grid;
            place-items: center;
            padding: clamp(10px, 2vw, 22px);
            background: rgba(0, 0, 0, 0.76);
        }
        .title-info-panel {
            position: relative;
            display: flex;
            width: min(72%, 430px);
            max-height: 88%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(5px, 1.2dvh, 10px);
            padding: clamp(14px, 3dvh, 26px);
            border: 2px solid #701a75;
            border-radius: 9px;
            background: #18181b;
            color: #e879f9;
            font-size: clamp(10px, 2.1dvh, 15px);
            font-weight: 800;
            line-height: 1.45;
            text-align: center;
            box-shadow: 0 0 32px rgba(217, 70, 239, 0.28), 0 14px 38px rgba(0, 0, 0, 0.7);
        }
        .title-info-logo {
            width: min(60%, 170px);
            max-height: 18dvh;
            margin-top: 2px;
            aspect-ratio: 528 / 584;
            background: #e879f9;
            -webkit-mask: url('proteinbeer.png') center / contain no-repeat;
            mask: url('proteinbeer.png') center / contain no-repeat;
            animation: proteinbeerLogoGlitch 2.3s steps(1, end) infinite;
        }
        @keyframes proteinbeerLogoGlitch {
            0%, 78%, 100% { transform: translate(0); filter: none; background: #e879f9; }
            80% { transform: translate(-3px, 1px); filter: drop-shadow(4px 0 #facc15); background: #e879f9; }
            83% { transform: translate(4px, -1px) skewX(-5deg); filter: drop-shadow(-4px 0 #701a75); background: #fff; }
            86% { transform: translate(-1px, 2px); filter: drop-shadow(3px 0 #fff); background: #f0abfc; }
            89% { transform: translate(0); filter: none; background: #e879f9; }
        }
        #doxxClickStart,
        #doxxClickGameMenuButton,
        [data-doxx-click-control] {
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            border: 1px solid #4a044e;
            background: #18181b;
            color: #e879f9;
            transition: border-color 120ms ease, background-color 120ms ease, color 120ms ease;
        }
        #doxxClickStart {
            width: var(--action-button-width);
            height: var(--action-button-height);
            min-width: 0;
            min-height: 0;
            padding: 0;
            border-radius: 10px;
            font-size: clamp(18px, 4dvh, 28px);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.48);
        }
        #doxxClickMute {
            display: flex;
            width: var(--action-button-width);
            height: var(--action-button-height);
            align-items: center;
            justify-content: center;
            border: 1px solid #4a044e;
            border-radius: 8px;
            background: #18181b;
            color: #e879f9;
            font-size: clamp(17px, 3.6dvh, 25px);
            font-weight: 900;
            line-height: 1;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.42);
            transition: border-color 120ms ease, background-color 120ms ease, color 120ms ease;
        }
        #doxxClickInfoButton { font-size: clamp(20px, 4.4dvh, 31px); }
        #doxxClickMute { font-size: clamp(18px, 4dvh, 28px); }
        @keyframes playArrowGlitch {
            0%, 76%, 100% { transform: translate(2px, 1px); filter: none; text-shadow: none; }
            78% { transform: translate(-2px, 0); filter: brightness(1.8); text-shadow: 3px 0 #d946ef, -2px 0 #facc15; }
            81% { transform: translate(4px, 2px) skewX(-12deg); filter: contrast(1.8); text-shadow: -3px 0 #701a75; }
            84% { transform: translate(1px, -1px); filter: brightness(1.4); text-shadow: 2px 0 #fff; }
            87% { transform: translate(2px, 1px); filter: none; text-shadow: none; }
        }
        @keyframes titleNameGlitch {
            0%, 100% { transform: translate(-50%, -50%); filter: none; }
            18% { transform: translate(calc(-50% - 4px), calc(-50% + 1px)); filter: brightness(1.7); text-shadow: 4px 0 #d946ef, -3px 0 #facc15; }
            36% { transform: translate(calc(-50% + 5px), calc(-50% - 2px)) skewX(-7deg); filter: contrast(1.8); text-shadow: -4px 0 #701a75; }
            54% { transform: translate(calc(-50% - 2px), calc(-50% + 2px)); filter: brightness(1.35); text-shadow: 3px 0 #fff; }
            72% { transform: translate(calc(-50% + 2px), calc(-50% - 1px)); filter: none; }
        }
        #doxxClickStart .doxx-click-arrow-icon,
        #doxxClickGameMenuButton .doxx-click-arrow-icon {
            animation: playArrowGlitch 1.45s steps(1, end) infinite;
        }
        .title-name.is-glitching { animation: titleNameGlitch 260ms steps(1, end) 1; }
        #doxxClickGameMenuButton .doxx-click-arrow-icon { position: relative; left: -2px; }
        button:not(:disabled):active,
        button.is-pressed {
            border-color: #f0abfc !important;
            background: #4a044e !important;
            color: #fff !important;
        }
        .doxx-click-arrow-icon { display: block; line-height: 1; transform: translate(-1px, 1px); }
        #doxxClickStart .doxx-click-arrow-icon { transform: translate(2px, 1px); }
        #doxxClickMenu {
            min-height: 0;
            padding: clamp(12px, 2vw, 22px);
            overflow: hidden;
            background: #09010b;
        }
        #doxxClickMenuScroll {
            height: 100%;
            min-height: 0;
            padding-right: 10px;
            overflow-y: scroll;
            scrollbar-color: #701a75 #2e032f;
            scrollbar-width: auto;
        }
        #doxxClickMenuScroll::-webkit-scrollbar { width: 11px; }
        #doxxClickMenuScroll::-webkit-scrollbar-track { background: #2e032f; border-radius: 999px; }
        #doxxClickMenuScroll::-webkit-scrollbar-thumb { background: #701a75; border: 2px solid #2e032f; border-radius: 999px; }
        #doxxClickStageGrid {
            display: grid;
            grid-template-columns: repeat(10, minmax(0, 1fr));
            grid-auto-rows: calc((100% - 32px) / 5);
            height: 100%;
            gap: 8px;
        }
        #doxxClickStageGrid button {
            min-width: 0;
            min-height: 36px;
            padding: 8px 2px;
            border: 1px solid #4a044e;
            border-radius: 6px;
            background: #18181b;
            color: #e879f9;
            font-size: clamp(11px, 2.4dvh, 16px);
            font-weight: 900;
        }
        #doxxClickStageGrid button:disabled { border-color: #18181b; background: #09090b; color: #3f3f46; cursor: not-allowed; }
        #doxxClickGameWrap { width: 100%; flex-direction: column; gap: 12px; }
        #doxxClickGameWrap:not(.hidden) { display: flex; }
        .doxx-click-canvas-shell { position: relative; width: 100%; }
        #doxxClickCanvas {
            display: block;
            border: 0;
            background: #050006;
            image-rendering: pixelated;
            touch-action: pan-y;
        }
        .doxx-click-canvas-shell > .absolute {
            position: absolute;
            z-index: 20;
            top: 12px;
            right: 12px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }
        #doxxClickPauseButton {
            display: flex;
            width: var(--action-button-width);
            height: var(--action-button-height);
            align-items: center;
            justify-content: center;
            border: 1px solid #4a044e;
            border-radius: 7px;
            background: #18181b;
            color: #e879f9;
            font-size: clamp(16px, 3.5dvh, 25px);
            font-weight: 900;
        }
        #doxxClickGameMenuButton {
            width: var(--action-button-width);
            height: var(--action-button-height);
            min-width: 0;
            min-height: 0;
            padding: 0;
            border-radius: 7px;
            font-size: clamp(18px, 4dvh, 28px);
        }
        #doxxClickGameMenuButton:not(.hidden) { display: flex; }
        .mobile-controls { display: none; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        [data-doxx-click-control] {
            min-height: clamp(50px, 11dvh, 76px);
            border-radius: 9px;
            font-size: clamp(15px, 3.3dvh, 23px);
            font-weight: 900;
            touch-action: none;
        }
        [data-doxx-click-control="jump"] {
            font-size: clamp(20px, 4.5dvh, 31px);
        }
        html:not(.doxx-platform-android) [data-doxx-click-control] {
            font-size: 0;
        }
        html:not(.doxx-platform-android) [data-doxx-click-control]::before {
            content: "";
            display: block;
            width: clamp(15px, 3.3dvh, 23px);
            aspect-ratio: 1;
            background: currentColor;
        }
        html:not(.doxx-platform-android) [data-doxx-click-control="left"]::before { clip-path: polygon(100% 0, 100% 100%, 0 50%); }
        html:not(.doxx-platform-android) [data-doxx-click-control="right"]::before { clip-path: polygon(0 0, 100% 50%, 0 100%); }
        html:not(.doxx-platform-android) [data-doxx-click-control="jump"]::before { clip-path: polygon(50% 0, 100% 100%, 0 100%); }
        [data-doxx-click-control]:disabled {
            opacity: 0.42;
            filter: grayscale(0.35);
            cursor: not-allowed;
        }
        #doxxClickStatus,
        #doxxClickTimerBox,
        #doxxClickRestart { display: none !important; }
        @keyframes doxxClickTitleBlinkTop { 0%, 100% { transform: scaleY(0); } 45%, 55% { transform: scaleY(1); } }
        @keyframes doxxClickTitleBlinkBottom { 0%, 100% { transform: scaleY(0); } 45%, 55% { transform: scaleY(1); } }
        .doxx-click-title-eye-blink { position: absolute; inset: 0; z-index: 5; overflow: hidden; pointer-events: none; }
        .doxx-click-title-eye-blink::before,
        .doxx-click-title-eye-blink::after { content: ""; position: absolute; left: 0; width: 100%; height: 50.5%; background: #000; will-change: transform; }
        .doxx-click-title-eye-blink::before { top: 0; transform-origin: top; transform: scaleY(0); }
        .doxx-click-title-eye-blink::after { bottom: 0; transform-origin: bottom; transform: scaleY(0); }
        .doxx-click-title-eye-blink.is-blinking::before { animation: doxxClickTitleBlinkTop 0.17s ease-in-out; }
        .doxx-click-title-eye-blink.is-blinking::after { animation: doxxClickTitleBlinkBottom 0.17s ease-in-out; }
        @media (hover: none) and (pointer: coarse) {
            .game-shell { padding: 0; }
            .game-frame { border-radius: 0; }
            .mobile-controls { display: grid !important; padding: 0 8px 8px; }
            .title-info-panel {
                justify-content: flex-start;
                padding: 14px;
            }
            .title-info-logo {
                width: min(42%, 110px);
                max-height: 11dvh;
                flex-shrink: 1;
            }
        }
        @media (hover: none) and (pointer: coarse) {
            html.doxx-controls-overlay body { display: block; overflow-y: auto; }
            html.doxx-controls-overlay .game-shell {
                width: 100%;
                margin: 0 auto;
                padding-bottom: max(72px, env(safe-area-inset-bottom));
            }
            html.doxx-controls-overlay .doxx-click-mobile-controls {
                position: absolute;
                z-index: 4;
                right: 12px;
                bottom: 10px;
                left: 12px;
                display: grid !important;
                grid-template-columns: repeat(6, minmax(0, 1fr));
                padding: 0;
            }
            html.doxx-controls-overlay .doxx-click-mobile-controls button:nth-child(1) { grid-column: 1; }
            html.doxx-controls-overlay .doxx-click-mobile-controls button:nth-child(2) { grid-column: 2; }
            html.doxx-controls-overlay .doxx-click-mobile-controls button:nth-child(3) { grid-column: 6; }
            html.doxx-controls-overlay .doxx-click-mobile-controls button { background: #18181b; backdrop-filter: blur(3px); }
        }
    </style>
</head>
<body>
    <main class="game-shell">
        <section id="doxxClickGameCard" class="game-frame" aria-label="Dox'x Click">
            <div id="doxxClickIntro">
                <img src="title.webp" alt="Dox'x Click title artwork" class="doxx-click-title-image" fetchpriority="high" decoding="async">
                <span class="doxx-click-title-eye-blink" aria-hidden="true"></span>
                <h1 class="title-name" data-doxx-click-readable>Dox'x Click</h1>
                <div class="title-side-actions" data-doxx-click-readable>
                    <button id="doxxClickTitleMenuButton" type="button" aria-label="Open title menu" aria-expanded="false"><span class="title-menu-icon" aria-hidden="true"></span></button>
                    <div class="title-menu-items">
                        <button id="doxxClickStageButton" type="button" aria-label="Stage selection">S</button>
                        <button id="doxxClickMute" type="button" aria-label="Mute audio" aria-pressed="false">&#9834;</button>
                        <button id="doxxClickInfoButton" type="button" aria-label="Game information">&copy;</button>
                    </div>
                </div>
                <div class="title-actions" data-doxx-click-readable>
                    <button id="doxxClickStart" type="button" aria-label="Play"><span class="doxx-click-arrow-icon" aria-hidden="true">&#9654;</span></button>
                </div>
                <div id="doxxClickInfoOverlay" class="title-info-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="doxxClickInfoTitle" aria-hidden="true">
                    <div class="title-info-panel" data-doxx-click-readable>
                        <div class="title-info-logo" role="img" aria-label="Proteinbeer developer logo"></div>
                        <div id="doxxClickInfoTitle">v0.2.96</div>
                        <div>&copy; 2026 &#9619;&#824;&#9618;&#9587;&#9617; &#9671;&#9618;&#9619;</div>
                    </div>
                </div>
            </div>
            <div id="doxxClickMenu" class="hidden" data-doxx-click-readable>
                <div id="doxxClickMenuScroll">
                    <div id="doxxClickStageGrid"></div>
                </div>
            </div>
            <div id="doxxClickGameWrap" class="hidden">
                <canvas id="doxxClickCanvas" width="960" height="540" aria-label="Dox'x Click game"></canvas>
                <div class="hidden">
                    <div id="doxxClickStatus">&#9619;&#9587;&#9618;</div>
                    <div id="doxxClickTimerBox"><span id="doxxClickTimerBar"></span></div>
                </div>
                <div class="mobile-controls">
                    <button type="button" data-doxx-click-control="left" aria-label="Move left">&#9664;</button>
                    <button type="button" data-doxx-click-control="right" aria-label="Move right">&#9654;</button>
                    <button type="button" data-doxx-click-control="jump" aria-label="Jump">&#9650;</button>
                </div>
                <button id="doxxClickRestart" type="button">Restart</button>
            </div>
        </section>
    </main>
    <script>
        if (new URLSearchParams(window.location.search).get('embed') === '1' && window.parent !== window) {
            document.documentElement.classList.add('doxx-embedded');
            const gameFrame = document.getElementById('doxxClickGameCard');
            let lastHeight = 0;
            const reportEmbeddedHeight = () => {
                const height = Math.ceil(gameFrame.getBoundingClientRect().height);
                if (!height || height === lastHeight) return;
                lastHeight = height;
                window.parent.postMessage({ type: 'doxx-click-height', height }, window.location.origin);
            };
            const resizeObserver = new ResizeObserver(reportEmbeddedHeight);
            resizeObserver.observe(gameFrame);
            new MutationObserver(() => requestAnimationFrame(reportEmbeddedHeight)).observe(gameFrame, {
                attributes: true,
                childList: true,
                subtree: true,
                attributeFilter: ['class', 'style']
            });
            window.addEventListener('load', reportEmbeddedHeight, { once: true });
            window.addEventListener('resize', reportEmbeddedHeight);
            requestAnimationFrame(reportEmbeddedHeight);
        }
    </script>
    <script src="platform-loader.js?v=0.2.96"></script>
</body>
</html>
